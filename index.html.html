<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ListingGen</title>
<meta name="application-name" content="ListingGen">
<meta name="description" content="Turn WhatsApp broadcast messages into Shopify-ready product listings instantly.">
<meta name="theme-color" content="#1A1612">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ListingGen">
<link id="manifest-link" rel="manifest">
<link id="apple-touch-icon" rel="apple-touch-icon">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9972A;
    --gold-light: #F5E6C0;
    --gold-dark: #8B6510;
    --ink: #1A1612;
    --ink-mid: #3D3530;
    --ink-soft: #6B5E52;
    --cream: #FAF7F2;
    --cream-dark: #F0EAE0;
    --surface: #FFFCF8;
    --border: rgba(201,151,42,0.2);
    --border-strong: rgba(201,151,42,0.45);
    --success: #2D7A4F;
    --success-bg: #EAF5EF;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    min-height: 100dvh;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }

  header {
    background: var(--ink);
    padding: calc(1.2rem + env(safe-area-inset-top)) 1.5rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 3px solid var(--gold);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header .logo-icon {
    width: 42px; height: 42px;
    background: var(--gold);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  header p {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
    font-weight: 400;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  main {
    max-width: 700px;
    margin: 0 auto;
    padding: 1.5rem 1rem calc(2rem + env(safe-area-inset-bottom));
  }

  .input-section {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .section-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold-dark);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-label::before {
    content: '';
    display: block;
    width: 3px; height: 14px;
    background: var(--gold);
    border-radius: 2px;
  }

  textarea {
    width: 100%;
    min-height: 160px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    background: var(--cream);
    color: var(--ink);
    resize: vertical;
    transition: border-color 0.2s;
    outline: none;
    -webkit-appearance: none;
  }

  textarea:focus {
    border-color: var(--gold);
    background: #fff;
  }

  textarea::placeholder {
    color: var(--ink-soft);
    font-style: italic;
  }

  .btn-generate {
    width: 100%;
    padding: 1rem;
    background: var(--gold);
    color: var(--ink);
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Sora', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.18s, transform 0.1s;
    margin-top: 1rem;
    min-height: 52px;
    touch-action: manipulation;
  }

  .btn-generate:hover { background: #E0AA35; }
  .btn-generate:active { transform: scale(0.98); background: #B8861F; }
  .btn-generate:disabled { background: var(--cream-dark); color: var(--ink-soft); cursor: not-allowed; transform: none; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(26,22,18,0.2);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .output-area {
    display: none;
    gap: 1rem;
    flex-direction: column;
  }

  .output-area.visible { display: flex; }

  .output-card {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .output-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.85rem 1.1rem;
    background: var(--ink);
    border-bottom: 2px solid var(--gold);
  }

  .output-card-title {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge {
    background: var(--gold);
    color: var(--ink);
    font-size: 0.58rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  .btn-copy {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid rgba(201,151,42,0.5);
    color: var(--gold);
    border-radius: 6px;
    font-family: 'Sora', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.03em;
    touch-action: manipulation;
    min-height: 36px;
  }

  .btn-copy:hover { background: rgba(201,151,42,0.12); }
  .btn-copy:active { background: rgba(201,151,42,0.2); }
  .btn-copy.copied { background: var(--success-bg); color: var(--success); border-color: var(--success); }

  .output-content {
    padding: 1.1rem 1.25rem;
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .title-display {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    padding: 1.1rem 1.25rem;
    line-height: 1.35;
  }

  .error-box {
    background: #FFF0F0;
    border: 1px solid #F5BDBD;
    border-radius: var(--radius-sm);
    padding: 1rem 1.25rem;
    color: #8B2020;
    font-size: 0.88rem;
    display: none;
    margin-top: 1rem;
  }

  .tip-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 0.75rem;
    align-items: center;
  }

  .tip-label {
    font-size: 0.65rem;
    color: var(--ink-soft);
  }

  .tip {
    font-size: 0.66rem;
    background: var(--gold-light);
    color: var(--gold-dark);
    padding: 5px 11px;
    border-radius: 20px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    border: none;
    font-family: 'Sora', sans-serif;
    touch-action: manipulation;
    min-height: 30px;
  }

  .tip:active { background: #d9c76a; }
  .tip:hover { background: #EDD890; }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--ink-soft);
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0.1rem 0;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .streaming-cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--gold);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 0.9s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* Install banner */
  .install-banner {
    display: none;
    align-items: center;
    gap: 12px;
    background: var(--gold-light);
    border: 1px solid var(--gold);
    border-radius: var(--radius-sm);
    padding: 0.85rem 1rem;
    margin-bottom: 1rem;
    font-size: 0.82rem;
    color: var(--gold-dark);
    font-weight: 500;
  }

  .install-banner.show { display: flex; }

  .install-banner .install-icon { font-size: 1.4rem; flex-shrink: 0; }

  .install-banner-text { flex: 1; line-height: 1.4; }

  .btn-install {
    padding: 7px 14px;
    background: var(--gold);
    color: var(--ink);
    border: none;
    border-radius: 6px;
    font-family: 'Sora', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    touch-action: manipulation;
  }

  .btn-dismiss {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 1rem;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
  }

  @media (max-width: 480px) {
    header { padding-left: 1rem; padding-right: 1rem; }
    main { padding-left: 0.85rem; padding-right: 0.85rem; }
    .title-display { font-size: 1.05rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">⌚</div>
  <div>
    <h1>ListingGen</h1>
    <p>WhatsApp → Product Listing</p>
  </div>
</header>

<main>
  <!-- Install banner (shown when installable) -->
  <div class="install-banner" id="installBanner">
    <span class="install-icon">📲</span>
    <span class="install-banner-text">Add to your home screen for quick access</span>
    <button class="btn-install" id="installBtn">Install</button>
    <button class="btn-dismiss" id="dismissBtn" title="Dismiss">✕</button>
  </div>


  <div class="input-section">
    <div class="section-label">Raw WhatsApp Message</div>
    <textarea id="rawInput" placeholder="Paste your WhatsApp broadcast message here…

Example:
🔥⌚️NAVIFORCE GENTS WATCH #NF8023 KES 1,600⌚️🔥
🔹Date Display
🔹Water resistant
🔹Battery powered
🔹Leather Strap
🔸2 color options"></textarea>

    <div class="tip-row">
      <span class="tip-label">Samples:</span>
      <button class="tip" onclick="loadSample(0)">Naviforce</button>
      <button class="tip" onclick="loadSample(1)">Poedagar</button>
      <button class="tip" onclick="loadSample(2)">SKMEI</button>
      <button class="tip" onclick="loadSample(3)">Citizen</button>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generate()">
      <span id="btnText">✦ Generate Listing</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div class="output-area" id="outputArea">
    <div class="divider">Generated Listing</div>

    <div class="output-card">
      <div class="output-card-header">
        <div class="output-card-title">🏷️ Product Title <span class="badge">TITLE</span></div>
        <button class="btn-copy" onclick="copySection('titleContent', this)">📋 Copy</button>
      </div>
      <div class="title-display" id="titleContent"></div>
    </div>

    <div class="output-card">
      <div class="output-card-header">
        <div class="output-card-title">⚡ Highlights <span class="badge">SHORT DESC</span></div>
        <button class="btn-copy" onclick="copySection('highlightsContent', this)">📋 Copy</button>
      </div>
      <div class="output-content" id="highlightsContent"></div>
    </div>

    <div class="output-card">
      <div class="output-card-header">
        <div class="output-card-title">📝 Description <span class="badge">LONG DESC</span></div>
        <button class="btn-copy" onclick="copySection('descContent', this)">📋 Copy</button>
      </div>
      <div class="output-content" id="descContent"></div>
    </div>
  </div>
</main>

<script>
// ── PWA: Generate icon as data URL (gold watch emoji on dark bg) ──
function makeIconDataURL(size) {
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1A1612';
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#C9972A';
  const inset = size * 0.14;
  const ir = size * 0.1;
  const iw = size - inset * 2;
  ctx.beginPath();
  ctx.moveTo(inset + ir, inset);
  ctx.lineTo(inset + iw - ir, inset);
  ctx.quadraticCurveTo(inset + iw, inset, inset + iw, inset + ir);
  ctx.lineTo(inset + iw, inset + iw - ir);
  ctx.quadraticCurveTo(inset + iw, inset + iw, inset + iw - ir, inset + iw);
  ctx.lineTo(inset + ir, inset + iw);
  ctx.quadraticCurveTo(inset, inset + iw, inset, inset + iw - ir);
  ctx.lineTo(inset, inset + ir);
  ctx.quadraticCurveTo(inset, inset, inset + ir, inset);
  ctx.closePath();
  ctx.fill();
  ctx.font = `bold ${size * 0.42}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⌚', size / 2, size / 2 + size * 0.03);
  return c.toDataURL('image/png');
}

// ── PWA: Inject manifest ──
function injectPWA() {
  const icon192 = makeIconDataURL(192);
  const icon512 = makeIconDataURL(512);

  const manifest = {
    name: 'ListingGen',
    short_name: 'ListingGen',
    description: 'WhatsApp broadcast to Shopify-ready product listings',
    start_url: location.href,
    display: 'standalone',
    background_color: '#1A1612',
    theme_color: '#1A1612',
    orientation: 'portrait-primary',
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };

  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const url = URL.createObjectURL(blob);
  document.getElementById('manifest-link').href = url;

  // Apple touch icon
  const touchLink = document.getElementById('apple-touch-icon');
  touchLink.href = icon192;
}

// ── PWA: Service worker (offline cache) via blob ──
function registerSW() {
  const swCode = `
const CACHE = 'listinggen-v1';
const ASSETS = [location.href];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    fetch(e.request).catch(() => caches.match(e.request))
  );
});
`;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register(url, { scope: '/' }).catch(() => {});
  }
}

// ── PWA: Install prompt ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
});

document.getElementById('dismissBtn').addEventListener('click', () => {
  document.getElementById('installBanner').classList.remove('show');
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
  deferredPrompt = null;
});

// Boot PWA
injectPWA();
registerSW();

// ── App logic ──

const SAMPLES = [
  `🔥⌚️NAVIFORCE GENTS WATCH #NF8023 KES 1,600⌚️🔥
🔹Date Display
🔹Water resistant
🔹Battery powered
🔹Leather Strap
🔸2 color options
✍️Engraving services available✍️
📞FOR ENQUIRIES CONTACT 0799-406-424`,

  `RESTOCKED
❤️‍🔥🔯 POEDAGAR GENTS 857 🔯❤️‍🔥
💰 KSH 1500
✳️Unique dial display
✳️Stainless steel
✳️Battery powered
✳️Water resistant
📌 3 colors option
FOR ORDERS AND ENQUIRIES CONTACT 0711-831-366`,

  `SKMEI LADIES 1901 🔥
*Bulk….@850
Pieces…@950`,

  `♨️♨️BACK IN STOCK♨️♨️
CITIZEN CHRONOGRAPH WATCH KES 2,000
📍Date display
📍Stainless steel
📍Battery powered
📍Water resistant
🎁EXECUTIVE BOX KES 350
🖊️Engraving services available🖊️
FOR ENQUIRIES CONTACT 0712-975-995`
];

function loadSample(i) {
  document.getElementById('rawInput').value = SAMPLES[i];
  document.getElementById('rawInput').focus();
}

async function generate() {
  const raw = document.getElementById('rawInput').value.trim();
  if (!raw) { showError('Please paste a WhatsApp product message first.'); return; }

  const btn = document.getElementById('generateBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const errorBox = document.getElementById('errorBox');

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Generating…';
  errorBox.style.display = 'none';

  const titleEl = document.getElementById('titleContent');
  const highlightsEl = document.getElementById('highlightsContent');
  const descEl = document.getElementById('descContent');
  const outputArea = document.getElementById('outputArea');

  titleEl.textContent = '';
  highlightsEl.textContent = '';
  descEl.textContent = '';

  const systemPrompt = `You are a product copywriter for a Kenyan watch/accessories retailer. Your job is to extract product information from raw WhatsApp broadcast messages and generate clean, engaging e-commerce copy.

RULES:
- IGNORE: prices, phone numbers, location/addresses, "restocked"/"back in stock" notices, contact info, box pricing, engraving mentions, wholesale/bulk pricing
- FOCUS ON: product name, brand, model number, and listed features only
- The brand/model is the foundation — use it to enrich the description with appropriate context
- Use emojis tastefully — not excessively
- Always include the fixed CTA at the end of the description

TITLE FORMATTING RULES (STRICT):
1. Always start with the BRAND NAME (e.g. SKMEI, NAVIFORCE, POEDAGAR, CITIZEN)
2. Immediately follow with the MODEL NUMBER (e.g. 1901, NF8023, 857)
3. In the middle, insert 1–2 key feature words if available from the text (e.g. Stainless Steel, Chronograph, Digital, Leather, Waterproof) — only if clearly mentioned
4. End with the gender category: use "Ladies Watch" for women's, "Gents Watch" for men's, "Unisex Watch" if unclear
5. "Ladies Watch" and "Gents Watch" must ALWAYS appear as the last two words together — never split them
6. Title Case throughout. No emojis in the title.
7. Examples of correct titles:
   - "SKMEI 1901 Stainless Steel Digital Ladies Watch"
   - "NAVIFORCE NF8023 Leather Strap Gents Watch"
   - "POEDAGAR 857 Stainless Steel Gents Watch"
   - "CITIZEN Chronograph Stainless Steel Gents Watch"

OUTPUT FORMAT — respond ONLY with valid JSON, no markdown, no extra text:
{
  "title": "Brand Model [1-2 features] Ladies/Gents Watch",
  "highlights": "Emoji bullet list of features (one per line, using relevant emoji per feature, NO title heading)",
  "description": "Full engaging product description (3-5 paragraphs) ending with the standard CTA"
}

STANDARD CTA TO ALWAYS INCLUDE AT END OF DESCRIPTION:
📞 Call/WhatsApp: 0724054583
🚚 Free delivery within Nairobi CBD
📦 Parcels to other towns — Ksh 190 via Parcel Grid
🏙️ Delivery within Nairobi Outskirts — Ksh 250`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: `Extract and generate listing from this WhatsApp message:\n\n${raw}` }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message || 'API error');

    const text = data.content?.map(c => c.text || '').join('') || '';
    const clean = text.replace(/```json|```/g, '').trim();
    let parsed;
    try {
      parsed = JSON.parse(clean);
    } catch {
      const match = clean.match(/\{[\s\S]*\}/);
      if (match) parsed = JSON.parse(match[0]);
      else throw new Error('Could not parse response. Please try again.');
    }

    outputArea.classList.add('visible');
    // Scroll to output smoothly
    setTimeout(() => outputArea.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

    typeText(titleEl, parsed.title || '', 18);
    setTimeout(() => typeText(highlightsEl, parsed.highlights || '', 10), 350);
    setTimeout(() => typeText(descEl, parsed.description || '', 8), 700);

  } catch (err) {
    showError('Error: ' + err.message);
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = '✦ Generate Listing';
  }
}

function typeText(el, text, speed) {
  el.textContent = '';
  const cursor = document.createElement('span');
  cursor.className = 'streaming-cursor';
  el.appendChild(cursor);
  let i = 0;
  const interval = setInterval(() => {
    if (i < text.length) {
      el.insertBefore(document.createTextNode(text[i]), cursor);
      i++;
    } else {
      clearInterval(interval);
      cursor.remove();
    }
  }, speed);
}

function copySection(id, btn) {
  const el = document.getElementById(id);
  const text = el.textContent || el.innerText;
  navigator.clipboard.writeText(text.trim()).then(() => {
    btn.classList.add('copied');
    btn.textContent = '✓ Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = '📋 Copy';
    }, 2000);
  }).catch(() => {
    // fallback for older mobile browsers
    const ta = document.createElement('textarea');
    ta.value = text.trim();
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.classList.add('copied');
    btn.textContent = '✓ Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = '📋 Copy';
    }, 2000);
  });
}

function showError(msg) {
  const errorBox = document.getElementById('errorBox');
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}

document.getElementById('rawInput').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generate();
});
</script>
